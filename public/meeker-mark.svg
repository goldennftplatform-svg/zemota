<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 26" shape-rendering="crispEdges" aria-hidden="true">
  <title>Ezra Meeker  pixel portrait</title>
  <!-- Palette: wheat / tan / saddle / dark brown (period photo feel) -->
  <defs>
    <style>
      .w { fill: #f5deb3 }
      .t { fill: #d2b48c }
      .m { fill: #c4a574 }
      .s { fill: #8b4513 }
      .d { fill: #3e2723 }
    </style>
  </defs>
  <rect class="w" width="20" height="26" rx="1"/>
  <!-- hair -->
  <rect class="d" x="6" y="1" width="8" height="1"/>
  <rect class="d" x="5" y="2" width="10" height="1"/>
  <rect class="d" x="4" y="3" width="12" height="2"/>
  <!-- face sides / jaw outline -->
  <rect class="d" x="3" y="5" width="2" height="8"/>
  <rect class="d" x="15" y="5" width="2" height="8"/>
  <!-- skin -->
  <rect class="t" x="5" y="5" width="10" height="3"/>
  <rect class="t" x="5" y="8" width="10" height="4"/>
  <rect class="m" x="8" y="10" width="1" height="1"/>
  <rect class="m" x="11" y="10" width="1" height="1"/>
  <!-- eyes (steady gaze) -->
  <rect class="d" x="7" y="7" width="2" height="1"/>
  <rect class="d" x="11" y="7" width="2" height="1"/>
  <!-- mustache -->
  <rect class="s" x="5" y="11" width="10" height="1"/>
  <rect class="s" x="4" y="12" width="12" height="1"/>
  <!-- beard mass -->
  <rect class="s" x="4" y="13" width="12" height="2"/>
  <rect class="s" x="5" y="15" width="10" height="2"/>
  <rect class="s" x="6" y="17" width="8" height="2"/>
  <rect class="s" x="7" y="19" width="6" height="1"/>
  <rect class="s" x="8" y="20" width="4" height="1"/>
  <rect class="s" x="9" y="21" width="2" height="1"/>
  <!-- collar / coat -->
  <rect class="d" x="3" y="22" width="14" height="1"/>
  <rect class="d" x="2" y="23" width="16" height="2"/>
  <rect class="s" x="4" y="23" width="4" height="2"/>
  <rect class="s" x="12" y="23" width="4" height="2"/>
  <!-- frame stroke -->
  <rect fill="none" stroke="#3e2723" stroke-width="0.5" x="0.25" y="0.25" width="19.5" height="25.5" rx="1"/>
</svg>
