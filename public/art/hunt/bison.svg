  <!-- shadow -->
  <ellipse cx="40" cy="42" rx="28" ry="5" fill="#1a1208" opacity="0.35"/>
  <!-- legs -->
  <rect x="18" y="34" width="6" height="10" fill="#3d2818"/>
  <rect x="30" y="34" width="6" height="10" fill="#3d2818"/>
  <rect x="44" y="34" width="6" height="10" fill="#3d2818"/>
  <rect x="56" y="34" width="6" height="10" fill="#3d2818"/>
  <!-- body -->
  <rect x="10" y="18" width="58" height="20" fill="#6b4423"/>
  <rect x="14" y="14" width="50" height="8" fill="#7a5030"/>
  <!-- hump -->
  <rect x="22" y="8" width="22" height="10" fill="#5c3820"/>
  <rect x="26" y="4" width="14" height="6" fill="#6b4423"/>
  <!-- head -->
